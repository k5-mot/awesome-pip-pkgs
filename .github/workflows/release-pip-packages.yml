name: Release Pip Packages

on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  setup:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.tag.outputs.value }}
    steps:
      - name: Generate tag
        id: tag
        run: echo "value=v$(date +'%Y.%m.%d')" >> "$GITHUB_OUTPUT"

  build-linux:
    needs: setup
    runs-on: ubuntu-latest
    steps:
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Download pip packages
        run: |
          pip3 download -d lib-python-docx-pillow  python-docx Pillow
          pip3 download -d lib-docling-mcp         "docling-mcp[local]"
          pip3 download -d lib-docling             docling
          pip3 download -d lib-markitdown          "markitdown[pptx,docx,xlsx,xls,pdf]"
          pip3 download -d lib-markitdown-ocr      markitdown-ocr
          pip3 download -d lib-markitdown-mcp      markitdown-mcp

      - name: Create zipballs
        run: |
          TAG=${{ needs.setup.outputs.tag }}
          zip -r pip-packages-python-docx-pillow-linux-x86_64-${TAG}.zip   lib-python-docx-pillow/
          zip -r pip-packages-docling-mcp-linux-x86_64-${TAG}.zip          lib-docling-mcp/
          zip -r pip-packages-docling-linux-x86_64-${TAG}.zip              lib-docling/
          zip -r pip-packages-markitdown-linux-x86_64-${TAG}.zip           lib-markitdown/
          zip -r pip-packages-markitdown-ocr-linux-x86_64-${TAG}.zip       lib-markitdown-ocr/
          zip -r pip-packages-markitdown-mcp-linux-x86_64-${TAG}.zip       lib-markitdown-mcp/

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: linux-packages
          path: "*.zip"

  build-windows:
    needs: setup
    runs-on: windows-latest
    steps:
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Download pip packages
        shell: bash
        run: |
          pip download -d lib-python-docx-pillow  python-docx Pillow
          pip download -d lib-docling-mcp         "docling-mcp[local]"
          pip download -d lib-docling             docling
          pip download -d lib-markitdown          "markitdown[pptx,docx,xlsx,xls,pdf]"
          pip download -d lib-markitdown-ocr      markitdown-ocr
          pip download -d lib-markitdown-mcp      markitdown-mcp

      - name: Create zipballs
        shell: pwsh
        run: |
          $TAG = "${{ needs.setup.outputs.tag }}"
          Compress-Archive -Path lib-python-docx-pillow  -DestinationPath "pip-packages-python-docx-pillow-windows-x86_64-${TAG}.zip"
          Compress-Archive -Path lib-docling-mcp         -DestinationPath "pip-packages-docling-mcp-windows-x86_64-${TAG}.zip"
          Compress-Archive -Path lib-docling             -DestinationPath "pip-packages-docling-windows-x86_64-${TAG}.zip"
          Compress-Archive -Path lib-markitdown          -DestinationPath "pip-packages-markitdown-windows-x86_64-${TAG}.zip"
          Compress-Archive -Path lib-markitdown-ocr      -DestinationPath "pip-packages-markitdown-ocr-windows-x86_64-${TAG}.zip"
          Compress-Archive -Path lib-markitdown-mcp      -DestinationPath "pip-packages-markitdown-mcp-windows-x86_64-${TAG}.zip"

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: windows-packages
          path: "*.zip"

  release:
    needs: [setup, build-linux, build-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download Linux packages
        uses: actions/download-artifact@v7
        with:
          name: linux-packages

      - name: Download Windows packages
        uses: actions/download-artifact@v7
        with:
          name: windows-packages

      - name: Create GitHub Release and upload assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.setup.outputs.tag }}
          name: Pip Packages ${{ needs.setup.outputs.tag }}
          body: |
            Offline pip packages bundle.

            | ファイル | 含まれるパッケージ | プラットフォーム |
            |---|---|---|
            | pip-packages-python-docx-pillow-linux-x86_64-*.zip | python-docx, Pillow | Linux x86_64 |
            | pip-packages-docling-mcp-linux-x86_64-*.zip | docling-mcp[local] | Linux x86_64 |
            | pip-packages-docling-linux-x86_64-*.zip | docling | Linux x86_64 |
            | pip-packages-markitdown-linux-x86_64-*.zip | markitdown[pptx,docx,xlsx,xls,pdf] | Linux x86_64 |
            | pip-packages-markitdown-ocr-linux-x86_64-*.zip | markitdown-ocr | Linux x86_64 |
            | pip-packages-markitdown-mcp-linux-x86_64-*.zip | markitdown-mcp | Linux x86_64 |
            | pip-packages-python-docx-pillow-windows-x86_64-*.zip | python-docx, Pillow | Windows x86_64 |
            | pip-packages-docling-mcp-windows-x86_64-*.zip | docling-mcp[local] | Windows x86_64 |
            | pip-packages-docling-windows-x86_64-*.zip | docling | Windows x86_64 |
            | pip-packages-markitdown-windows-x86_64-*.zip | markitdown[pptx,docx,xlsx,xls,pdf] | Windows x86_64 |
            | pip-packages-markitdown-ocr-windows-x86_64-*.zip | markitdown-ocr | Windows x86_64 |
            | pip-packages-markitdown-mcp-windows-x86_64-*.zip | markitdown-mcp | Windows x86_64 |
          files: "*.zip"
