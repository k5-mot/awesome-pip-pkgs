name: Release Pip Packages

on:
  workflow_dispatch:

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate tag
        id: tag
        run: echo "value=v$(date +'%Y.%m.%d')" >> "$GITHUB_OUTPUT"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Download pip packages
        run: |
          pip3 download -d lib-python-docx-pillow python-docx Pillow
          pip3 download -d lib-docling-mcp "docling-mcp[local]"
          pip3 download -d lib-docling docling
          pip3 download -d lib-markitdown "markitdown[pptx,docx,xlsx,xls,pdf]"
          pip3 download -d lib-markitdown-ocr markitdown-ocr
          pip3 download -d lib-markitdown-mcp markitdown-mcp

      - name: Create zipballs
        run: |
          TAG=${{ steps.tag.outputs.value }}
          zip -r pip-packages-python-docx-pillow-${TAG}.zip    lib-python-docx-pillow/
          zip -r pip-packages-docling-mcp-${TAG}.zip           lib-docling-mcp/
          zip -r pip-packages-docling-${TAG}.zip               lib-docling/
          zip -r pip-packages-markitdown-${TAG}.zip            lib-markitdown/
          zip -r pip-packages-markitdown-ocr-${TAG}.zip        lib-markitdown-ocr/
          zip -r pip-packages-markitdown-mcp-${TAG}.zip        lib-markitdown-mcp/

      - name: Create GitHub Release and upload assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.value }}
          name: Pip Packages ${{ steps.tag.outputs.value }}
          body: |
            Offline pip packages bundle.

            | ファイル | 含まれるパッケージ |
            |---|---|
            | pip-packages-python-docx-pillow-*.zip | python-docx, Pillow |
            | pip-packages-docling-mcp-*.zip | docling-mcp[local] |
            | pip-packages-docling-*.zip | docling |
            | pip-packages-markitdown-*.zip | markitdown[pptx,docx,xlsx,xls,pdf] |
            | pip-packages-markitdown-ocr-*.zip | markitdown-ocr |
            | pip-packages-markitdown-mcp-*.zip | markitdown-mcp |
          files: |
            pip-packages-python-docx-pillow-${{ steps.tag.outputs.value }}.zip
            pip-packages-docling-mcp-${{ steps.tag.outputs.value }}.zip
            pip-packages-docling-${{ steps.tag.outputs.value }}.zip
            pip-packages-markitdown-${{ steps.tag.outputs.value }}.zip
            pip-packages-markitdown-ocr-${{ steps.tag.outputs.value }}.zip
            pip-packages-markitdown-mcp-${{ steps.tag.outputs.value }}.zip
